<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>Animal Game Web</title>
    <style>
        body { font-family: sans-serif; padding: 16px; background: #202020; color: #f0f0f0; }
        #board { display: grid; grid-template-columns: repeat(8, 40px); grid-auto-rows: 40px; gap: 4px; margin-top: 12px; }
        .cell { display: flex; align-items: center; justify-content: center; font-size: 12px;
                background: #333; border-radius: 4px; cursor: pointer; }
        .cell.special { background: #555; }
        .cell.selected { outline: 2px solid yellow; }
        .panel { margin-top: 12px; }
        button { margin-right: 8px; }
        .captured-panel { display: flex; gap: 24px; }
        .captured-panel span { font-size: 14px; }
    </style>
</head>
<body>
    <h1>Animal Game Web</h1>
    <div class="panel">
        <label>用户名：
            <input id="username" type="text" placeholder="请输入用户名" />
        </label>
    </div>
    <div class="panel">
        <button id="btnNew">新建对局（作为玩家A）</button>
    </div>
    <div class="panel">
        <label>对局ID：
            <input id="gameIdInput" type="text" placeholder="已有对局ID" />
        </label>
        <button id="btnJoin">加入对局</button>
        <button id="btnFlip">翻牌说明</button>
    </div>
    <div class="panel">
        <div id="status">未连接</div>
    </div>
    <div class="panel captured-panel">
        <div>红方被吃：<span id="capturedRed"></span></div>
        <div>黑方被吃：<span id="capturedBlack"></span></div>
    </div>
    <div id="board"></div>

    <script src="main.js"></script>
</body>
</html>
