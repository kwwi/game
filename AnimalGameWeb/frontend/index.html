<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>Animal Game Web</title>
    <style>
        body { font-family: sans-serif; padding: 16px; background: #1e2a24; color: #e0e0e0; }
        #board { display: grid; grid-template-columns: repeat(8, 40px); grid-auto-rows: 40px; gap: 4px; margin-top: 12px; }
        .cell { display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold;
                background: #2d4a3d; border-radius: 4px; cursor: pointer; color: #8a9a8e; }
        .cell.special { background: #3d4a5c; }
        .cell.face-down { color: #6a7a6e; }
        .cell.selected { outline: 2px solid #e8c547; }
        .cell.piece-red { color: #e53935; }
        .cell.piece-black { color: #1a1a1a; }
        .panel { margin-top: 12px; }
        button { margin-right: 8px; }
        .captured-panel { display: flex; gap: 24px; }
        .captured-panel span { font-size: 14px; }
        #capturedRed { color: #e53935; }
        #capturedBlack { color: #1a1a1a; }
        .room-table { margin-top: 8px; border-collapse: collapse; font-size: 13px; }
        .room-table th, .room-table td { border: 1px solid #3d4a5c; padding: 6px 10px; text-align: left; }
        .room-table th { background: #2d4a3d; }
        .room-table tr.full { opacity: 0.7; }
        .role-red { color: #e53935; }
        .role-black { color: #1a1a1a; }
    </style>
</head>
<body>
    <h1>Animal Game Web</h1>
    <div class="panel">
        <label>用户名：
            <input id="username" type="text" placeholder="请输入用户名" />
        </label>
    </div>
    <div class="panel">
        <button id="btnQuickJoin">快速加入</button>
        <button id="btnFlip">翻牌说明</button>
    </div>
    <div class="panel">
        <label>房间ID：<input id="gameIdInput" type="text" placeholder="输入房间ID加入" /></label>
        <button id="btnJoin">加入房间</button>
    </div>
    <div class="panel" id="roomPanel">
        <strong>房间列表</strong>
        <button id="btnRefreshRooms">刷新</button>
        <div id="roomList"></div>
    </div>
    <div class="panel">
        <div id="status">未连接</div>
        <button id="btnLeave">退出房间</button>
    </div>
    <div class="panel captured-panel">
        <div>红方被吃：<span id="capturedRed"></span></div>
        <div>黑方被吃：<span id="capturedBlack"></span></div>
    </div>
    <div id="board"></div>

    <script src="main.js"></script>
</body>
</html>
